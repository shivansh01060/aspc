<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- ── Primary SEO ── -->
    <title>Ashok Spice Clinic | Pure Spices & Masalas</title>
    <meta
      name="description"
      content="Ashok Spice Clinic (ASPC) — premium pure spices, masalas and blends crafted with 20+ years of heritage. Red Chilli, Turmeric, Garam Masala, Cardamom and more. Contact us for bulk enquiries."
    />
    <meta
      name="keywords"
      content="spices, masala, ashok spice clinic, ASPC, pure spices, red chilli, turmeric, garam masala, cardamom, cumin, coriander, bulk spices, indian spices"
    />
    <meta name="author" content="Ashok Spice Clinic" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (WhatsApp / Facebook preview) ── -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Ashok Spice Clinic | Pure Spices & Masalas"
    />
    <meta
      property="og:description"
      content="Premium pure spices and masalas with 20+ years of heritage. Explore our range and get in touch for bulk orders."
    />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://aspc.in" />
    <meta property="og:site_name" content="Ashok Spice Clinic" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Ashok Spice Clinic | Pure Spices & Masalas"
    />
    <meta
      name="twitter:description"
      content="Premium pure spices and masalas with 20+ years of heritage."
    />
    <meta name="twitter:image" content="/logo.png" />

    <!-- ── Google Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ── Theme colour (browser chrome on mobile) ── -->
    <meta name="theme-color" content="#FAF7F0" />

    <style>
      /* Prevent flash of unstyled content */
      html {
        background: #faf7f0;
      }
      body {
        margin: 0;
        font-family: "DM Sans", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
